[pytest]
# Основные настройки pytest

# Пути для поиска тестов
testpaths = tests

# Паттерны для поиска тестовых файлов
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Маркеры для категоризации тестов
markers =
    unit: Unit тесты (быстрые, изолированные)
    integration: Интеграционные тесты (требуют БД или внешних сервисов)
    slow: Медленные тесты
    api: Тесты API endpoints
    database: Тесты, требующие подключения к БД
    auth: Тесты аутентификации
    utils: Тесты утилит
    services: Тесты сервисов
    repositories: Тесты репозиториев

# Настройки asyncio
asyncio_mode = auto

# Настройки покрытия кода (если используется pytest-cov)
# addopts = --cov=app --cov-report=html --cov-report=term-missing

# Минимальная версия Python
minversion = 3.8

# Настройки вывода
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Игнорируемые директории
norecursedirs = .git .venv venv __pycache__ *.egg-info

# Настройки логирования
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
