services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capitalview-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    networks:
      - capitalview

  worker-task:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capitalview-worker-task
    restart: unless-stopped
    command: ["python", "-m", "app.workers.task_worker_optimized"]
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    networks:
      - capitalview

  worker-moex-prices:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capitalview-worker-moex-prices
    restart: unless-stopped
    command: ["python", "-m", "app.workers.moex_price_worker"]
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    networks:
      - capitalview

  worker-currency-prices:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capitalview-worker-currency-prices
    restart: unless-stopped
    command: ["python", "-m", "app.workers.currency_price_worker"]
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    networks:
      - capitalview

  worker-crypto-prices:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capitalview-worker-crypto-prices
    restart: unless-stopped
    command: ["python", "-m", "app.workers.crypto_price_worker"]
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    networks:
      - capitalview

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api/v1
    container_name: capitalview-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - capitalview

  redis:
    image: redis:7-alpine
    container_name: capitalview-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - capitalview

volumes:
  redis_data:

networks:
  capitalview:
    driver: bridge
