services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capitalview-backend
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-capitalview}
      - DB_USER=${DB_USER:-capitalview}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:80}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - BACKEND_URL=${BACKEND_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - capitalview

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api/v1
    container_name: capitalview-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - capitalview

  postgres:
    image: postgres:15-alpine
    container_name: capitalview-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-capitalview}
      - POSTGRES_USER=${DB_USER:-capitalview}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - capitalview

  redis:
    image: redis:7-alpine
    container_name: capitalview-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - capitalview

volumes:
  postgres_data:
  redis_data:

networks:
  capitalview:
    driver: bridge
