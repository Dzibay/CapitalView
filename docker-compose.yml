services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: capitalview-backend
    container_name: capitalview-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    networks:
      - capitalview

  worker-task:
    image: capitalview-backend
    container_name: capitalview-worker-task
    restart: unless-stopped
    command: ["python", "-m", "app.workers.task_worker_optimized"]
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    networks:
      - capitalview

  worker-moex-prices:
    image: capitalview-backend
    container_name: capitalview-worker-moex-prices
    restart: unless-stopped
    command: ["python", "-m", "app.workers.moex_price_worker"]
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    networks:
      - capitalview

  worker-currency-prices:
    image: capitalview-backend
    container_name: capitalview-worker-currency-prices
    restart: unless-stopped
    command: ["python", "-m", "app.workers.currency_price_worker"]
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    networks:
      - capitalview

  worker-crypto-prices:
    image: capitalview-backend
    container_name: capitalview-worker-crypto-prices
    restart: unless-stopped
    command: ["python", "-m", "app.workers.crypto_price_worker"]
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    networks:
      - capitalview

  # Caddy — reverse proxy с автоматическим SSL (Let's Encrypt)
  caddy:
    image: caddy:2-alpine
    container_name: capitalview-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - frontend
    networks:
      - capitalview

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api/v1
        - VITE_YM_COUNTER_ID=${VITE_YM_COUNTER_ID}
        - VITE_YANDEX_VERIFICATION_ID=${VITE_YANDEX_VERIFICATION_ID}
    container_name: capitalview-frontend
    restart: unless-stopped
    # Порт 80 не пробрасываем — Caddy проксирует на frontend:80
    depends_on:
      - backend
    networks:
      - capitalview

  redis:
    image: redis:7-alpine
    container_name: capitalview-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - capitalview

volumes:
  redis_data:
  caddy_data:

networks:
  capitalview:
    driver: bridge
