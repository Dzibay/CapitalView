server {
    listen 80;
    server_name capital-view.ru www.capital-view.ru localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip / сжатие ответов (в т.ч. проксируемых JSON с API)
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        text/xml
        image/svg+xml
        application/vnd.ms-fontobject
        font/ttf
        font/otf
        font/eot;

    # Статика frontend (SPA)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # Кэш для статических ассетов (js, css, fonts)
    location ~* \.(js|css|woff2?|ttf|ico|svg)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Проксирование API на backend
    location /api {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # У клиента можно запросить gzip; nginx сожмёт ответ бэкенда при Accept-Encoding: gzip
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check
    location /health {
        proxy_pass http://backend:5000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
